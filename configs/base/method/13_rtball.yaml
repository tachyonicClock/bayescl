label:
  method: rtball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: TBALL
  rank: 10
  init_sd: 0.5
  prior_weight_sd: 1.0
  bias: False
  bnn: FFG

strategy:
  type: VCL
  beta: 1.0
  train_samples: 1
  test_samples: 5
  train_mask: False

replay: 2000

hpsearch:
  params:
    "strategy.beta": {type: float, low: 0.0, high: 2.0, log: False}
