label: blob


peft:
  type: BLoB
  beta: 0.0
  vbll: False
  bayes_eval_samples: 10
  config:
    r: 10
    vbnn:
      prior_loc: 0.0
      prior_std: 0.5
      init_sigma_loc: 0.1
      init_sigma_std: 0.01
      deterministic_eval: false
  save: true

hpsearch:
  params:
    "peft.beta": {type: float, low: 0.01, high: 2, log: True}
