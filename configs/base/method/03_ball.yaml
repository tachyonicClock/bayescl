label:
  study: anneal
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: True
  train_samples: 1
  test_samples: 5

  softmax_avg: False

  anneal:
    type: linear
    start: 0.0
    end: 1.0

  config:
    r: 10

    vbnn:
      prior_mean: 0.0
      prior_sd: 1.0
      init_sd: 0.001
      init_sd_sd: 1e-5
      deterministic_eval: false

hpsearch:
  n_trials: 15
  params:
    "lr": {type: float, low: 0.0005, high: 0.002, log: True}
    "peft.anneal.start": {type: float, low: 0.0, high: 0.5}
    "peft.anneal.end": {type: float, low: 0.5, high: 1.0}
