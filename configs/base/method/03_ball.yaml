label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

# Since we use 'ensemble_size' samples per forward pass, we reduce the eval batch size 
# to keep memory usage similar to other methods
eval_mb_size: 64

model:
  type: huggingface
  name: google/vit-base-patch16-224
  adapter_filter: ".*(key|query|value|dense)"

peft:
  type: BALL

  vbll: False
  beta: 1.0
  train_samples: 1
  test_samples: 4

  softmax_avg: False

  config:
    beta: 0.01
    r: 10
    ensemble_size: 4

    vbnn:
      prior_mean: 0.0
      prior_sd: 1.0
      init_sd: 0.001
      init_sd_sd: 0.0001
      deterministic_eval: false

hpsearch:
  n_trials: 15
  params:
    "lr": {type: float, low: 0.0001, high: 0.005, log: True}
    "peft.beta": {type: categorical, choices: [0.0, 0.01, 0.1, 1.0, 10.0]}
