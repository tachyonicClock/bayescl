label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

# Since we use 'ensemble_size' samples per forward pass, we reduce the eval batch size 
# to keep memory usage similar to other methods
eval_mb_size: 64

peft:
  type: BALL

  vbll: False
  train_samples: 1
  test_samples: 1
  ensemble_size: 4

  softmax_avg: False

  config:
    r: 3

    vbnn:
      prior_mean: 0.0
      prior_sd: 1.0
      init_sd: 0.02
      init_sd_sd: 0.005
      deterministic_eval: false

hpsearch:
  n_trials: 15
  params:
    "peft.beta": {type: float, low: 0.01, high: 2.0, log: True}
