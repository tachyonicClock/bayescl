label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: False
  train_samples: 1
  test_samples: 5

  config:
    r: 10

hpsearch:
  params:
    "peft.config.max_sd": {type: categorical, choices: [None, 0.3, 0.1]}
    "peft.config.prior_weight_sd": {type: float, low: 0.0, high: 1.0, log: False}
    "peft.config.init_sd": {type: float, low: 0.0, high: 0.05, log: False}
