label:
  study: init_sd

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: True
  train_samples: 1
  test_samples: 5

  softmax_avg: False

  config:
    r: 10

    vbnn:
      prior_mean: 0.0
      prior_sd: 1.0
      init_sd: 0.001
      init_sd_sd: 1e-5
      deterministic_eval: false

hpsearch:
  n_trials: 15
  params:
    peft.config.vbnn.init_sd: {type: float, low: 1e-4, high: 1.0, log: True}
