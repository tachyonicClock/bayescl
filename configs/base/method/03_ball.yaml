label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: False
  train_samples: 1
  test_samples: 5

  config:
    prior_weight_sd: 0.5
    init_sd: 0.01
    local_reparameterization: False

    r: 10

hpsearch:
  params:
    "lr": {type: float, low: 0.0001, high: 0.001, log: False}
    "peft.beta": {type: float, low: 0.001, high: 1.0, log: False}
