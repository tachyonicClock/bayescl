label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: False
  train_samples: 1
  test_samples: 5

  config:
    r: 10
    vbnn:
      prior_mean: 0.0
      prior_weight_sd: 0.5
      init_sd: 0.1
      init_sd_sd: 0.01
      deterministic_eval: false

hpsearch:
  params:
    "peft.beta": {type: float, low: 0.1, high: 2.0, log: True}
    # Scientific hyperparameter:
    "peft.config.mode": {type: categorical, choices: [ "lrt", "flipout"]}
