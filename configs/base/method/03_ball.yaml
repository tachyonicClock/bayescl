label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: True
  train_samples: 1
  test_samples: 5

  config:
    r: 10
    vbnn:
      prior_mean: 0.0
      prior_sd: 1.0
      init_sd: 0.01
      init_sd_sd: 0.001
      deterministic_eval: false

hpsearch:
  n_trials: 15
  params:
    "peft.beta": {type: float, low: 0.0001, high: 1.0, log: True}
    "peft.warmup_epochs": {type: int, low: 0, high: 10, step: 1}
  
hpsearch_study_version: 13
