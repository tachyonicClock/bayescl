label:
  method: ball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: BALL
  beta: 1.0

  vbll: False
  train_samples: 1
  test_samples: 10

  softmax_avg: False

  config:
    r: 10
    vbnn:
      prior_mean: 0.0
      prior_sd: 1.0
      init_sd: 0.02
      deterministic_eval: false

hpsearch:
  n_trials: 15
  params:
    "peft.first_task_beta": {type: float, low: 0.001, high: 1.0, log: True}
    "peft.beta": {type: float, low: 0.0, high: 10000, log: False}

hpsearch_study_version: 17
