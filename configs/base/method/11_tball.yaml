label:
  method: tball

# BALL uses local CE but it is implemented internally so we turn this off here
use_local_ce: False

peft:
  type: TBALL
  rank: 10
  init_sd: 0.5
  prior_weight_sd: 1.0
  bias: True
  bnn: FCG

strategy:
  type: VCL
  beta: 1.0
  train_samples: 1
  test_samples: 5

mmce:
  weight: 1.0

hpsearch:
  n_trials: 15
  params:
    "mmce.weight": {type: float, low: 0.0, high: 1.0, log: False}
