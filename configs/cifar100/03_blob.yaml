# Tune BLoB
include: [../base.yaml, 00_base.yaml]
label: blob

# From hyper-parameter search bayescl/SplitCIFAR100/blob/adb502b (id=5162) n=10
lr: 0.0033118018204161864

peft:
  type: BLoB
  # From hyper-parameter search bayescl/SplitCIFAR100/blob/adb502b (id=5162) n=10
  beta: 0.9870219406091099
  config:
    r: 10
    blob_A:
      prior_mu: 0.0
      prior_sigma: 1.0
      init_sigma: 1e-4
      deterministic_eval: true
    blob_B:
      prior_mu: 0.0
      prior_sigma: 1.0
      init_sigma: 1e-4
      deterministic_eval: true
hpsearch:
  params:
    "peft.beta": {type: float, low: 0.01, high: 10, log: True}
