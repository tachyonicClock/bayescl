# Tune BLoB
include: [../base.yaml, 00_cifar100.yaml]
label: blob

lr: 0.0008

peft:
  type: BLoB
  beta: 3000
  config:
    r: 5
    blob_B:
      prior_mu: 0.0
      prior_sigma: 1.0

      init_mu_mean: 0.0
      init_sigma_mean: 0.05

      init_mu_std: 1e-3
      init_rho_std: 1e-3

      deterministic_eval: True

    blob_A:
      prior_mu: 0.0
      prior_sigma: 1.0

      # Initialization is close to zero to give BLoB a warm start
      init_mu_mean: 0.0
      init_sigma_mean: 0.001

      init_mu_std: 0.0
      init_rho_std: 1e-3

      deterministic_eval: True
