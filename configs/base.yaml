label: naive

lr: 0.001

train_mb_size: 128
eval_mb_size: 256
num_workers: 4

model:
  type: huggingface
  name: google/vit-base-patch16-224
  adapter_filter: ".*(key|query)"

hpsearch:
  params:
    "lr": {type: float, low: 0.001, high: 0.01, log: True}
    # When hyper-parameter searching use a validation set in place of the test set
    "scenario.validation_set": {type: constant, value: 0.1}

  sampler: random
  n_trials: 5
  direction: [maximize, minimize]
