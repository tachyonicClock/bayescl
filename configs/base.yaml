label:
  study: manual

lr: 0.001

train_mb_size: 128
eval_mb_size: 256
num_workers: 4

model:
  type: huggingface
  name: facebook/dinov2-small
  adapter_filter: ".*(dense|fc1|fc2|key|query|value)"
  head_module: "model.classifier"

hpsearch:
  params:
    "lr": {type: float, low: 0.0001, high: 0.01, log: True}
    # When hyper-parameter searching use a validation set in place of the test set
    "scenario.validation": {type: constant, value: True}

  sampler: QMC
  n_trials: 15
  direction: [maximize, minimize]
