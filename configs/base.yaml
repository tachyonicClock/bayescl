lr: 0.001

train_mb_size: 128
eval_mb_size: 256
num_workers: 4

model:
  type: huggingface
  name: microsoft/resnet-18
  adapter_filter: ".*layer\\.[0-9]\\.convolution"
  head_module: "model.classifier.1"

standardize: True

hpsearch:
  params:
    "lr": {type: float, low: 0.0001, high: 0.01, log: True}
    # When hyper-parameter searching use a validation set in place of the test set
    "scenario.validation": {type: constant, value: True}

  sampler: QMC
  n_trials: 10
  direction: [maximize, minimize]
